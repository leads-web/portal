<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiência Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  color:#00ff88;
}

/* PARTICLES */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:60px;
}

.glow {
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
}

/* MOCKUP */
.mockup {
  width:300px;
  margin-top:30px;
  animation:float 4s ease-in-out infinite;
}

@keyframes float {
  0% {transform:translateY(0);}
  50% {transform:translateY(-20px);}
  100% {transform:translateY(0);}
}

/* BOTÃO */
.btn {
  display:inline-block;
  margin-top:30px;
  padding:18px 40px;
  background:linear-gradient(90deg,#00ff88,#00cc66);
  color:#000;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 20px #00ff88;
}

/* FADE */
.fade {
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div id="loader">Carregando experiência...</div>

<canvas id="particles"></canvas>

<section class="hero">
  <div>
    <h1>SITES QUE <span class="glow">VENDEM SOZINHOS</span></h1>
    <p>Experiência premium de conversão</p>

    <img class="mockup" src="https://images.unsplash.com/photo-1559028012-481c04fa702d">

    <br>

    <a href="https://wa.me/5513982332023" class="btn">
      🚀 Quero meu site
    </a>
  </div>
</section>

<script>
// LOADER
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1200);
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.y += p.speed;
    if(p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = "#00ff88";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

// SCROLL ANIMATION
window.addEventListener('scroll', ()=>{
  document.querySelectorAll('.fade').forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
