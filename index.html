<!DOCTYPE html>
<html lang="pt-br">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {

  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* CONTAINER */
.container {

}

/* TÍTULO */
h1 {

.glow {

}

/* BOTÃO */
.btn {
  display:inline-block;
  margin-top:30px;
  padding:18px 40px;

  color:#000;
  font-weight:bold;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 0 20px #00ff88;
  transition:.3s;

.btn:hover {
  transform:scale(1.1);

</head>
